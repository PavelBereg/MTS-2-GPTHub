version: '3.8'

services:
  backend:
    build: .
    container_name: mts-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - QDRANT_URL=http://qdrant:6333
    volumes:
      - .:/app
    depends_on:
      - qdrant
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant
    container_name: mts-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: mts-openwebui
    ports:
      - "3000:8080"
    environment:
      - OPENAI_API_BASE_URL=http://backend:8000/v1
      - OPENAI_API_KEY=any-fake-key
      - WEBUI_AUTH=False  # Отключаем обязательную авторизацию для упрощения локальных тестов
      
      # 🚀 ГЛАВНЫЙ ФИКС: Отключаем скачивание моделей с HuggingFace 
      # Переключаем движок RAG с "локального" на фейковый "openai"
      - RAG_EMBEDDING_ENGINE=openai
      - RAG_OPENAI_API_BASE_URL=http://backend:8000/v1
      - RAG_OPENAI_API_KEY=fake_key
    volumes:
      - webui_data:/app/backend/data
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  qdrant_data:
  webui_data:
