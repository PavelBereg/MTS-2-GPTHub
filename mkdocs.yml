site_name: "MTS AI Assistant — Документация"
site_description: "Техническая документация бэкенд-пайплайна ИИ-ассистента на базе MWS API, LangGraph и Qdrant"
site_author: "MTS Hackathon Team"
dev_addr: '127.0.0.1:9000'

theme:
  name: material
  language: ru
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Тёмная тема
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Светлая тема
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.expand
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  icon:
    logo: material/robot-happy-outline
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Главная: index.md
  - Быстрый старт: setup.md
  - Архитектура: architecture.md
  - Ключевые модули:
      - Роутинг и API: api_routes.md
      - Долгосрочная память: memory.md
      - Инструменты (Tools): tools.md
